name: Attest Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attest (e.g., v1.0.0-RC)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          mkdir -p /tmp/artifacts
          echo "Downloading release artifacts for ${TAG}..."
          gh release download "$TAG" --dir /tmp/artifacts --pattern "*.zip"
          gh release download "$TAG" --dir /tmp/artifacts --pattern "checksums.txt"
          echo "Downloaded:"
          ls -la /tmp/artifacts/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            /tmp/artifacts/specter_*.zip
            /tmp/artifacts/checksums.txt
